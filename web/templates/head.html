<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://static.divine-pride.net" crossorigin>
<link rel="stylesheet" href="/static/tailwind.css">
<link rel="stylesheet" href="/static/app.css">
<script src="/static/htmx.min.js" defer></script>
<script>
    (function () {
        var validThemes = ['light', 'dark', 'midnight', 'forest', 'rose', 'ocean', 'sunset', 'lavender', 'coffee', 'nord', 'dracula'];
        var validSizes = ['sm', 'md', 'lg', 'xl'];
        var t, fs;
        try { t = localStorage.theme; fs = localStorage.fontSize; } catch (e) {}
        if (!t || validThemes.indexOf(t) === -1) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (!fs || validSizes.indexOf(fs) === -1) fs = 'md';
        var html = document.documentElement;
        html.dataset.theme = t;
        html.dataset.fontSize = fs;
        if (t === 'light') {
            html.classList.remove('dark');
        } else {
            html.classList.add('dark');
        }
    })();
</script>
